<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm Gradient: Sun-kissed Orange -> Golden Yellow -> Deep Poppy Red -->
    <linearGradient id="warmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" /> <!-- Golden Yellow -->
      <stop offset="50%" stop-color="#FF8C00" /> <!-- Orange -->
      <stop offset="100%" stop-color="#FF4500" /> <!-- Poppy Red -->
    </linearGradient>
    
    <!-- Glassmorphism Overlay Gradient -->
    <linearGradient id="glassOverlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4" />
      <stop offset="40%" stop-color="white" stop-opacity="0.1" />
      <stop offset="100%" stop-color="white" stop-opacity="0.0" />
    </linearGradient>

    <!-- Deep Burgundy for Text -->
    <solidColor id="burgundy" solid-color="#631826" />

    <!-- Soft Long Shadow -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="4" dy="8" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Inner Glow/Bevel for Glass effect -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k2="1" k3="1" />
    </filter>
  </defs>

  <!-- Clean White Rounded Square Background -->
  <rect width="512" height="512" rx="110" fill="white" />

  <!-- Main Speech Bubble Group -->
  <g transform="translate(256, 256)" filter="url(#softShadow)">
    <!-- Bubble Shape -->
    <path d="M 0 -180 
             C 110 -180 200 -100 200 10 
             C 200 120 110 200 0 200 
             C -40 200 -80 190 -110 170 
             L -190 210 
             L -160 130 
             C -190 90 -200 50 -200 10 
             C -200 -100 -110 -180 0 -180 Z" 
          fill="url(#warmGradient)" />
          
    <!-- Glassy Overlay (Top Left Highlight) -->
    <path d="M 0 -170 
             C 100 -170 190 -90 190 10 
             C 190 60 170 100 140 130 
             C 180 80 180 -20 120 -100 
             C 50 -160 -50 -160 -120 -100
             C -160 -60 -180 0 -180 10
             C -180 -90 -100 -170 0 -170 Z" 
          fill="url(#glassOverlay)" />
  </g>

  <!-- Symbol: Stylized $ with ! stroke -->
  <g transform="translate(256, 210)">
    <!-- The 'S' part of the Dollar Sign -->
    <path d="M 50 -60 
             C 100 -60 120 -30 120 10 
             C 120 60 70 80 10 90 
             C -50 100 -100 120 -100 170 
             C -100 220 -60 250 10 250" 
          fill="none" 
          stroke="white" 
          stroke-width="45" 
          stroke-linecap="round"
          stroke-opacity="0.9" />
          
    <path d="M -50 80 
             C -100 80 -120 50 -120 10 
             C -120 -40 -70 -60 -10 -70 
             C 50 -80 100 -100 100 -150 
             C 100 -200 60 -230 -10 -230" 
          fill="none" 
          stroke="white" 
          stroke-width="45" 
          stroke-linecap="round"
          stroke-opacity="0.9" />

    <!-- The '!' Vertical Stroke -->
    <!-- Top part of ! -->
    <path d="M 0 -260 L 0 120" 
          stroke="white" 
          stroke-width="40" 
          stroke-linecap="round" />
    <!-- Dot part of ! -->
    <circle cx="0" cy="200" r="25" fill="white" />
  </g>

  <!-- Text: Descontaí -->
  <!-- Tilted slightly upwards (-5 deg), Burgundy color, Rounded Font -->
  <text x="256" y="420" 
        transform="rotate(-4, 256, 420)"
        text-anchor="middle" 
        font-family="'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif" 
        font-weight="bold" 
        font-size="76" 
        fill="#631826"
        stroke="white"
        stroke-width="4"
        paint-order="stroke">
    Descontaí
  </text>
</svg>
