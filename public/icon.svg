<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo 600 -->
      <stop offset="100%" stop-color="#06B6D4" /> <!-- Cyan 500 -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background Container (Rounded Square for App Icon) -->
  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#bg-gradient)" />
  
  <!-- Main Symbol Group -->
  <g transform="translate(106, 106) scale(0.6)" filter="url(#shadow)">
    <!-- Stylized Tag Shape -->
    <path d="M 250 50 L 450 250 L 300 450 L 50 450 L 50 200 Z" fill="#ffffff" stroke="none" />
    
    <!-- Percentage Symbol / Discount Metaphor -->
    <circle cx="150" cy="300" r="35" fill="#4F46E5" />
    <circle cx="350" cy="300" r="35" fill="#4F46E5" />
    <line x1="380" y1="200" x2="120" y2="400" stroke="#4F46E5" stroke-width="40" stroke-linecap="round" />
    
    <!-- Hole Punch -->
    <circle cx="150" cy="150" r="30" fill="#4F46E5" />
  </g>
</svg>
